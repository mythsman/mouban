name: Go Build

on:
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      GOPROXY: https://goproxy.cn,direct
      GO111MODULE: on
    
    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: https://gitea.com/actions/checkout@v4

      - name: Set up Go
        uses: https://gitea.com/actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Show Go version
        run: go version

      - name: Build
        run: ./build.sh

      - name: Docker login
        run: echo "${{ secrets.GITEA_TOKEN }}" | docker login -u "${{ secrets.GITEA_USERNAME }}" --password-stdin

      - name: Docker push
        run: docker push gitea.mythsman.com/${{ secrets.GITEA_USERNAME }}/mouban:latest

