name: 手动触发示例

on:
  workflow_dispatch:  # 允许在 Web 界面手动触发

jobs:
  print-message:
    runs-on: ubuntu-latest
    steps:
      - name: 打印 Hello World
        run: echo "👋 Hello, Gitea Actions!"

      - name: 打印当前时间
        run: echo "🕐 当前时间: $(date)"

      - name: 打印系统信息
        run: |
          echo "🐧 系统信息:"
          uname -a
          echo ""
          echo "📂 当前目录:"
          pwd
          ls -la

      - name: 打印环境变量
        run: |
          echo "🌍 一些环境变量:"
          echo "GITHUB_WORKFLOW: $GITHUB_WORKFLOW"
          echo "GITHUB_RUN_ID: $GITHUB_RUN_ID"
          echo "GITHUB_REPOSITORY: $GITHUB_REPOSITORY"

      - name: 打印 Git 信息
        run: |
          echo "📝 Git 信息:"
          git log -1 --pretty=format:"%h - %an, %ar : %s"
          echo ""
          echo "🌿 当前分支:"
          git branch --show-current

